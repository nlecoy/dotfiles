# ~/.config/tmux/tmux.conf

# ============================================
# General Settings
# ============================================

# Remap prefix from Ctrl+b to Ctrl+x (easier to reach on azerty)
unbind C-b
set-option -g prefix C-x
bind-key C-x send-prefix

# Start window numbering at 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Enable mouse support
set -g mouse on

# Reduce escape time (faster key response)
set -sg escape-time 10

# Enable focus event (for vin/neovim integration)
set -g focus-events on

# ============================================
# Key Bindings
# ============================================

# Intuitive split shortcuts
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# New window inherits current path
bind n new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Panel resizing with Shift+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Enable vi mode for copy
setw -g mode-keys vi

# Vi-style copy bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
